name: jetx
description: A modern Flutter framework for state management, dependency injection, and route management. An actively maintained fork of GetX.
version: 0.1.0-alpha.1
homepage: https://github.com/alamre/jetx
repository: https://github.com/alamre/jetx
issue_tracker: https://github.com/alamre/jetx/issues
documentation: https://github.com/alamre/jetx#readme
keywords: flutter, state management, dependency injection, get, getx, jetx, reactive, navigation, http, animations

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.7.0
  pretty_dio_logger: ^1.4.0

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
